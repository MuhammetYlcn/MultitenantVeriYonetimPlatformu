services:
  postgres:
    image: postgres:16
    container_name: veriyonetim-postgres
    environment:
      POSTGRES_USER: veriyonetim
      POSTGRES_PASSWORD: veriyonetim
      POSTGRES_DB: veriyonetim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
